  /orgs/{org_id}/upload_revisions/{upload_revision_id}/files:
    post:
      description: |
        Upload files to an upload revision using `multipart/form-data` requests.

        Each request can contain one or more files, with each passed as individual parts.  Provide the file path in the `name` parameter of the `Content-Disposition` header.  Snyk ignores the `filename` parameter.

        Do not use carriage return, newline, or literal " characters in file paths. Inconsistent encoding across HTTP clients prevents reliable interpretation of these characters.

        Use Unix-style directory separators (`/`). Backslashes (`\`) are not supported as directory separators. Snyk treats them as literal characters in filepaths.

        You can upload up to 50 MB of files per request. The maximum size of a single file is 50MB. An upload revision can contain up to 300,000 files, with a maximum combined size of 2GB. You can upload at most 50 batches of files per upload revision.

        If you upload to the same file path multiple times, the new upload replaces the previous one. Snyk uses the final version.
