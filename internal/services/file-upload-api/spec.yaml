info:
  title: file-upload-api
  version: 3.0.0
openapi: 3.0.3
paths:
  /openapi:
    get:
      description: List available versions of OpenAPI specification
      operationId: listAPIVersions
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: List of available versions is returned
          headers:
            snyk-request-id:
              $ref: '#/components/headers/RequestIdResponseHeader'
        "400":
          $ref: '#/components/responses/400'
        "401":
          $ref: '#/components/responses/401'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - OpenAPI
  /openapi/{version}:
    get:
      description: Get OpenAPI specification effective at version.
      operationId: getAPIVersion
      parameters:
      - description: The requested version of the API
        in: path
        name: version
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: OpenAPI specification matching requested version is returned
          headers:
            snyk-request-id:
              $ref: '#/components/headers/RequestIdResponseHeader'
            snyk-version-requested:
              $ref: '#/components/headers/VersionRequestedResponseHeader'
            snyk-version-served:
              $ref: '#/components/headers/VersionServedResponseHeader'
        "400":
          $ref: '#/components/responses/400'
        "401":
          $ref: '#/components/responses/401'
        "404":
          $ref: '#/components/responses/404'
        "500":
          $ref: '#/components/responses/500'
      tags:
      - OpenAPI
  /orgs/{org_id}/upload_revisions:
    post:
      description: "Create an empty upload revision. \n\nAn upload revision represents
        a collection of uploaded files.\n\n**API interaction pattern:**\n\n1. Create
        an upload revision using the current endpoint\n\n2. Upload and associate files
        with an upload revision using the `Populate an upload revision` endpoint \n\n3.
        After you have uploaded all the files, seal the upload revision using the
        `Update an upload revision` endpoint, so that Snyk can process the files.\n"
      operationId: createUploadRevision
      parameters:
      - $ref: '#/components/parameters/Version'
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/UserAgent'
      - $ref: '#/components/parameters/JsonContentTypeHeader'
      - $ref: '#/components/parameters/ContentEncodingHeader'
      requestBody:
        content:
          application/vnd.api+json:
            examples:
              CreateSnapshotRevision:
                summary: Create a new snapshot revision
                value:
                  data:
                    attributes:
                      revision_type: snapshot
                    type: upload_revision
            schema:
              $ref: '#/components/schemas/UploadRevisionPostRequest_2024_10_15'
        description: The upload revision to create
      responses:
        "201":
          content:
            application/vnd.api+json:
              examples:
                SnapshotRevisionCreated:
                  summary: New snapshot revision successfully created
                  value:
                    data:
                      attributes:
                        revision_type: snapshot
                        sealed: false
                      id: abcdef01-abcd-abcd-abcd-abcdef012345
                      type: upload_revision
                    jsonapi:
                      version: "1.0"
                    links:
                      self:
                        href: ""
              schema:
                $ref: '#/components/schemas/UploadRevisionPostResponse_2024_10_15'
          description: Upload revision created
          headers:
            deprecation:
              $ref: '#/components/headers/DeprecationHeader__0'
            location:
              $ref: '#/components/headers/LocationHeader'
            snyk-request-id:
              $ref: '#/components/headers/RequestIdResponseHeader__0'
            snyk-version-lifecycle-stage:
              $ref: '#/components/headers/VersionStageResponseHeader__0'
            snyk-version-requested:
              $ref: '#/components/headers/VersionRequestedResponseHeader__0'
            snyk-version-served:
              $ref: '#/components/headers/VersionServedResponseHeader__0'
            sunset:
              $ref: '#/components/headers/SunsetHeader__0'
        "400":
          $ref: '#/components/responses/400__0'
        "401":
          $ref: '#/components/responses/401__0'
        "403":
          $ref: '#/components/responses/403'
        "500":
          $ref: '#/components/responses/500__0'
      summary: Create a new upload revision
      tags:
      - Upload Revision
      x-cerberus:
        authorization:
          resource:
            pathId: org_id
            permissions:
            - read
            type: org
          skip: false
        enableAccessAudit: true
      x-snyk-api-lifecycle: released
      x-snyk-api-owners:
      - '@snyk/team-workspaces'
      - '@snyk/productinfra_workspaces'
      x-snyk-api-releases:
      - 2024-10-15~beta
      x-snyk-api-resource: upload_revisions
      x-snyk-api-stability: beta
      x-snyk-api-version: 2024-10-15~beta
      x-stability-level: beta
  /orgs/{org_id}/upload_revisions/{upload_revision_id}:
    patch:
      description: |
        Mark an upload revision as completed.

        Update the revision with `sealed: true` so Snyk can process the files. The revision becomes immutable when sealed and any further uploads will fail.
      operationId: updateUploadRevision
      parameters:
      - $ref: '#/components/parameters/Version'
      - $ref: '#/components/parameters/OrgId'
      - $ref: '#/components/parameters/UploadRevisionId'
      - $ref: '#/components/parameters/RequestId'
